<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'" />
    <title>Pick region</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.32);
        cursor: crosshair;
        user-select: none;
        overflow: hidden;
        font-family:
          'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica,
          Arial, sans-serif;
      }
      .hint {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(8, 8, 10, 0.92);
        color: #f5f5f7;
        padding: 10px 18px;
        border-radius: 8px;
        font-size: 13px;
        pointer-events: none;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .hint kbd {
        background: rgba(255, 255, 255, 0.12);
        border-radius: 4px;
        padding: 1px 6px;
        font-family: ui-monospace, Menlo, monospace;
        font-size: 11px;
        margin: 0 2px;
      }
      .display-label {
        position: fixed;
        top: 16px;
        left: 16px;
        background: rgba(8, 8, 10, 0.92);
        color: #00ffff;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 12px;
        font-family: ui-monospace, Menlo, monospace;
        pointer-events: none;
        border: 1px solid rgba(0, 255, 255, 0.25);
      }
      .work-area {
        position: fixed;
        border: 1px solid rgba(255, 255, 255, 0.08);
        pointer-events: none;
        box-sizing: border-box;
      }
      .ghost {
        position: fixed;
        border: 2px dashed rgba(0, 255, 255, 0.45);
        background: rgba(0, 255, 255, 0.04);
        pointer-events: none;
        box-sizing: border-box;
      }
      .ghost-tag {
        position: absolute;
        top: -22px;
        left: 0;
        background: rgba(0, 255, 255, 0.5);
        color: #001818;
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .selection {
        position: fixed;
        border: 2px solid #00ffff;
        background: rgba(0, 255, 255, 0.08);
        pointer-events: none;
        box-sizing: border-box;
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.6) inset,
          0 0 24px rgba(0, 255, 255, 0.4);
      }
      .readout {
        position: fixed;
        background: rgba(8, 8, 10, 0.92);
        color: #00ffff;
        padding: 4px 10px;
        border-radius: 4px;
        font-family: ui-monospace, Menlo, monospace;
        font-size: 12px;
        pointer-events: none;
        border: 1px solid rgba(0, 255, 255, 0.25);
        white-space: nowrap;
      }
      .inactive .selection,
      .inactive .readout {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="hint">
      Click and drag to select a region · <kbd>Esc</kbd> to cancel
    </div>
    <div class="display-label" id="display-label"></div>
    <div class="work-area" id="work-area"></div>
    <div class="ghost" id="ghost" hidden>
      <div class="ghost-tag">Current</div>
    </div>
    <div class="selection" id="selection" hidden></div>
    <div class="readout" id="readout" hidden></div>
    <script>
      const params = new URLSearchParams(location.search)
      const displayId = parseInt(params.get('displayId'), 10)
      const isCurrent = params.get('isCurrent') === '1'
      const woX = parseInt(params.get('workAreaOffsetX'), 10)
      const woY = parseInt(params.get('workAreaOffsetY'), 10)
      const wW = parseInt(params.get('workAreaWidth'), 10)
      const wH = parseInt(params.get('workAreaHeight'), 10)
      const displayLabel = decodeURIComponent(params.get('displayLabel') || 'Display')

      document.getElementById('display-label').textContent = displayLabel

      const wa = document.getElementById('work-area')
      wa.style.left = woX + 'px'
      wa.style.top = woY + 'px'
      wa.style.width = wW + 'px'
      wa.style.height = wH + 'px'

      if (isCurrent && params.has('existingX')) {
        const ex = parseInt(params.get('existingX'), 10)
        const ey = parseInt(params.get('existingY'), 10)
        const ew = parseInt(params.get('existingWidth'), 10)
        const eh = parseInt(params.get('existingHeight'), 10)
        const ghost = document.getElementById('ghost')
        ghost.style.left = ex + woX + 'px'
        ghost.style.top = ey + woY + 'px'
        ghost.style.width = ew + 'px'
        ghost.style.height = eh + 'px'
        ghost.hidden = false
      }

      let dragging = false
      let startX = 0
      let startY = 0
      const sel = document.getElementById('selection')
      const readout = document.getElementById('readout')

      function clamp(v, lo, hi) {
        return Math.max(lo, Math.min(hi, v))
      }

      function clipToWorkArea(x, y, w, h) {
        let nx = x
        let ny = y
        let nw = w
        let nh = h
        if (nx < woX) {
          nw -= woX - nx
          nx = woX
        }
        if (ny < woY) {
          nh -= woY - ny
          ny = woY
        }
        if (nx + nw > woX + wW) nw = woX + wW - nx
        if (ny + nh > woY + wH) nh = woY + wH - ny
        return { x: nx, y: ny, w: nw, h: nh }
      }

      document.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return
        dragging = true
        startX = e.clientX
        startY = e.clientY
        sel.style.left = startX + 'px'
        sel.style.top = startY + 'px'
        sel.style.width = '0px'
        sel.style.height = '0px'
        sel.hidden = false
        readout.hidden = false
      })

      document.addEventListener('mousemove', (e) => {
        if (!dragging) return
        const x = Math.min(startX, e.clientX)
        const y = Math.min(startY, e.clientY)
        const w = Math.abs(e.clientX - startX)
        const h = Math.abs(e.clientY - startY)
        const c = clipToWorkArea(x, y, w, h)
        sel.style.left = c.x + 'px'
        sel.style.top = c.y + 'px'
        sel.style.width = Math.max(0, c.w) + 'px'
        sel.style.height = Math.max(0, c.h) + 'px'
        readout.style.left = clamp(e.clientX + 12, 0, window.innerWidth - 120) + 'px'
        readout.style.top = clamp(e.clientY + 12, 0, window.innerHeight - 30) + 'px'
        readout.textContent = Math.max(0, c.w) + ' × ' + Math.max(0, c.h)
      })

      document.addEventListener('mouseup', (e) => {
        if (!dragging) return
        dragging = false
        const x = Math.min(startX, e.clientX)
        const y = Math.min(startY, e.clientY)
        const w = Math.abs(e.clientX - startX)
        const h = Math.abs(e.clientY - startY)
        const c = clipToWorkArea(x, y, w, h)
        if (c.w < 8 || c.h < 8) {
          sel.hidden = true
          readout.hidden = true
          return
        }
        const rect = {
          x: Math.floor(c.x - woX),
          y: Math.floor(c.y - woY),
          width: Math.floor(c.w),
          height: Math.floor(c.h)
        }
        window.api.regionPickerSubmit(displayId, rect)
      })

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          window.api.regionPickerCancel()
        }
      })

      window.addEventListener('contextmenu', (e) => e.preventDefault())
    </script>
  </body>
</html>
