appId: com.janitorpuppo.monitor-overlay
productName: Monitor Overlay
copyright: Copyright (c) 2026 JanitorPuppo
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: monitor-overlay
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: Monitor Overlay
  uninstallDisplayName: Monitor Overlay
  createDesktopShortcut: always
  createStartMenuShortcut: true
npmRebuild: false
publish:
  provider: github
  owner: JanitorPuppo
  repo: monitor-overlay
  releaseType: release
