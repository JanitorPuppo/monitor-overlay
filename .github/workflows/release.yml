name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Verify tag matches package.json version
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'.TrimStart('v')
          $pkgVersion = (Get-Content package.json | ConvertFrom-Json).version
          if ($tag -ne $pkgVersion) {
            Write-Error "Tag '${{ github.ref_name }}' does not match package.json version '$pkgVersion'. Bump version in package.json and re-tag."
            exit 1
          }
          Write-Host "Tag and package.json version match: $pkgVersion"

      - name: Cache electron-builder downloads
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm ci

      - name: Build and publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish:win
